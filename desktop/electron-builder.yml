appId: com.peekremote.desktop
productName: Peek Remote
copyright: Copyright © 2026 MusicMaster4

directories:
  output: ../dist-electron
  buildResources: build

# Renderer + main process sources packed into the asar.
files:
  - src/**/*
  - renderer/**/*
  - package.json

# The PyInstaller-built backend bundle is shipped alongside the app (unpacked),
# so the end user never needs Python. Built by CI into ../dist/peek-backend.
extraResources:
  - from: ../dist/peek-backend
    to: backend

# Auto-update source: GitHub Releases. electron-updater reads latest.yml /
# latest-mac.yml from the release matching the running version.
publish:
  provider: github
  owner: MusicMaster4
  repo: PeekRemote
  releaseType: draft

win:
  icon: build/icon.ico
  target:
    - nsis
  artifactName: ${productName}-${version}-Setup.${ext}
  # No code signing by default; set CSC_LINK / CSC_KEY_PASSWORD secrets to sign.

nsis:
  oneClick: false
  perMachine: false
  allowElevation: true
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Peek Remote
  installerIcon: build/icon.ico
  uninstallerIcon: build/icon.ico
  installerHeaderIcon: build/icon.ico
  # Keep user config (in %APPDATA%) across updates — handled automatically.

mac:
  icon: build/icon.png
  # arm64 only: CI builds the Python backend for the runner's native arch
  # (Apple Silicon), so a single-arch app keeps the bundled backend correct
  # instead of shipping an Intel app with an arm64 backend.
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
  category: public.app-category.utilities
  artifactName: ${productName}-${version}-${arch}.${ext}
  gatekeeperAssess: false
  hardenedRuntime: true
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  # Unsigned by default (no Apple cert) so the .dmg builds in CI. Signing +
  # notarization (required for macOS auto-update to apply) switch on
  # automatically when the Apple secrets are present — see the workflow.

dmg:
  artifactName: ${productName}-${version}-${arch}.${ext}
